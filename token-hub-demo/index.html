<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>联想 Token Hub · 托盘版原型</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="desktop" aria-label="Windows 11 桌面">
      <div class="desktop-copy">
        <span>Windows 11</span>
        <strong>专注于此刻</strong>
      </div>
    </main>

    <section class="tray-panel open" id="tray-panel" aria-label="联想 Token Hub">
      <div class="panel-page active" data-panel-page="home">
        <header class="panel-header">
          <div class="app-brand">
            <img src="https://pr1-greenteacdn.lenovo.com.cn/config/202605/1780061482103_svgviewer-output%205.png" alt="" />
            <h1>联想 Token Hub</h1>
          </div>
          <div class="panel-actions">
            <button class="icon-button settings-button" data-settings="true" aria-label="设置" title="设置">⚙</button>
            <button class="icon-button" data-close-panel="true" aria-label="关闭">×</button>
          </div>
        </header>

        <section class="onboarding-card" id="onboarding-card"></section>

        <div class="ready-content" id="ready-content">
          <section class="smart-mode">
            <div class="smart-mode-copy">
              <span class="feature-icon compact">✦</span>
              <div>
                <strong>智能模型匹配</strong>
                <p>按应用特性自动选择模型</p>
              </div>
            </div>
            <button class="toggle active" data-smart-toggle="true" aria-label="智能模型匹配"></button>
          </section>

          <section class="section-block">
            <div class="section-heading">
              <h2>应用列表</h2>
              <button class="icon-button refresh" data-refresh-apps="true" aria-label="重新检测应用" title="重新检测应用">↻</button>
            </div>
            <div class="tool-list" id="tool-list"></div>
          </section>

          <section class="web-shortcuts">
            <button data-web-link="dashboard"><span>▥</span><strong>数据看板</strong><small>↗</small></button>
            <button data-web-link="logs"><span>◇</span><strong>使用日志</strong><small>↗</small></button>
          </section>

          <section class="account-list" id="account-bar"></section>
        </div>
      </div>

      <div class="panel-page" data-panel-page="models">
        <header class="detail-header">
          <button class="back-button" data-back-home="true" aria-label="返回">←</button>
          <div>
            <h1 id="detail-tool-name"></h1>
            <p>选择此应用使用的模型</p>
          </div>
          <button class="icon-button" data-close-panel="true" aria-label="关闭">×</button>
        </header>
        <div class="detail-accent"></div>
        <section class="model-list" id="model-list"></section>
      </div>

      <div class="panel-page" data-panel-page="settings">
        <header class="detail-header">
          <button class="back-button" data-back-home="true" aria-label="返回">←</button>
          <div>
            <h1>设置</h1>
            <p>托盘与自动匹配偏好</p>
          </div>
          <button class="icon-button" data-close-panel="true" aria-label="关闭">×</button>
        </header>
        <div class="detail-accent"></div>
        <section class="settings-list">
          <div class="setting-row"><div><strong>开机自启</strong><small>登录 Windows 后自动运行</small></div><button class="toggle active" aria-label="开机自启"></button></div>
          <div class="setting-row"><div><strong>系统通知</strong><small>发现新应用和切换异常时提醒</small></div><button class="toggle active" aria-label="系统通知"></button></div>
          <div class="setting-row"><div><strong>自动检测新应用</strong><small>安装应用后自动加入列表</small></div><button class="toggle active" aria-label="自动检测新应用"></button></div>
          <div class="setting-row"><div><strong>默认开启智能匹配</strong><small>新应用优先使用推荐模型</small></div><button class="toggle active" aria-label="默认开启智能匹配"></button></div>
        </section>
      </div>

    </section>

    <aside class="desktop-notification" id="tool-notification" aria-live="polite">
      <header>
        <div class="notification-brand">
          <img src="https://pr1-greenteacdn.lenovo.com.cn/config/202605/1780061482103_svgviewer-output%205.png" alt="" />
          <span>联想 Token Hub</span>
        </div>
        <button data-dismiss-notification="true" aria-label="关闭通知">×</button>
      </header>
      <div class="notification-content">
        <span class="tool-mark">QC</span>
        <div>
          <strong>发现新应用 QClaw</strong>
          <p>完成首次初始化后即可为它选择模型</p>
        </div>
      </div>
      <div class="notification-actions">
        <button data-dismiss-notification="true">稍后</button>
        <button class="primary" data-open-tool="qclaw">查看应用</button>
      </div>
    </aside>

    <section class="auth-window" id="auth-window" hidden aria-label="联想账号登录">
      <header class="auth-titlebar">
        <div>
          <img src="https://pr1-greenteacdn.lenovo.com.cn/config/202605/1780061482103_svgviewer-output%205.png" alt="" />
          <strong>联想账号登录</strong>
        </div>
        <button class="window-close" data-close-auth="true" aria-label="关闭">×</button>
      </header>
      <main class="auth-webview">
        <div class="auth-brand">
          <img src="https://pr1-greenteacdn.lenovo.com.cn/config/202605/1780061482103_svgviewer-output%205.png" alt="" />
          <strong>联想账号</strong>
        </div>
        <section class="auth-card">
          <h2>登录联想账号</h2>
          <p>登录后继续使用联想 Token Hub</p>
          <label>手机号</label>
          <input value="15*******88" aria-label="手机号" />
          <label>验证码</label>
          <div class="auth-code">
            <input placeholder="请输入验证码" aria-label="验证码" />
            <button>获取验证码</button>
          </div>
          <button class="auth-submit" data-complete-login="true">登录并授权</button>
          <small>登录即表示您同意联想账号服务协议与隐私政策</small>
        </section>
      </main>
    </section>

    <footer class="taskbar" aria-label="Windows 任务栏">
      <div class="taskbar-center">
        <button class="windows-start" aria-label="开始"><span></span><span></span><span></span><span></span></button>
        <button class="taskbar-app" aria-label="文件资源管理器">▰</button>
        <button class="taskbar-app" aria-label="Microsoft Teams">T</button>
        <button class="taskbar-app" aria-label="Windows 安全中心">♢</button>
      </div>
      <div class="system-tray">
        <span>⌃</span>
        <button class="tray-app-button active" id="tray-app-button" aria-label="联想 Token Hub 托盘菜单">
          <img src="https://pr1-greenteacdn.lenovo.com.cn/config/202605/1780061482103_svgviewer-output%205.png" alt="" />
        </button>
        <span>⌁</span>
        <span>▥</span>
        <time>10:01<br /><small>2026/6/2</small></time>
        <span>☾</span>
      </div>
    </footer>

    <div class="app-toast" id="app-toast" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
