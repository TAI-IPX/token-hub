<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>联想 Token Hub · 托盘版原型</title>
    <link rel="stylesheet" href="./styles.css?v=demo-menu-20260604" />
  </head>
  <body>
    <main class="desktop" aria-label="Windows 11 桌面">
      <div class="desktop-copy">
        <span>Windows 11</span>
        <strong>专注于此刻</strong>
      </div>
      <button class="desktop-app-icon" id="desktop-app-icon" aria-label="打开联想 Token Hub">
        <span>
          <img src="https://pr1-greenteacdn.lenovo.com.cn/config/202605/1780061482103_svgviewer-output%205.png" alt="" />
        </span>
        <strong>联想 Token Hub</strong>
      </button>
      <div class="desktop-demo-controls">
        <button class="demo-menu-trigger" data-demo-menu="true" aria-label="选择演示场景" aria-expanded="false">
          <span class="hamburger" aria-hidden="true">☰</span>
          <strong id="demo-current-label" hidden>正常使用 - 智能匹配关</strong>
        </button>
        <div class="demo-control-buttons" id="demo-menu" hidden>
          <button data-demo-state="login-required">首次使用 - 未登录</button>
          <button data-demo-state="configuring">首次使用 - 配置中</button>
          <button data-demo-state="smart-off">正常使用 - 智能匹配关</button>
          <button data-demo-state="smart-on">正常使用 - 智能匹配开</button>
          <button data-demo-state="unconfigured">待选择模型 - 多应用未配置</button>
          <button data-demo-state="external-config">外部配置 - 部分应用不由 Token Hub 管理</button>
          <button data-demo-state="low-balance">额度不足 - 引导充值</button>
          <button data-demo-state="auto-discovery">通知 - 智能匹配开，发现新应用</button>
          <button data-demo-state="manual-discovery">通知 - 智能匹配关，发现新应用</button>
          <button data-demo-state="external-discovery">通知 - 发现外部配置</button>
        </div>
      </div>
    </main>

    <section class="tray-panel open" id="tray-panel" aria-label="联想 Token Hub">
      <div class="panel-page active" data-panel-page="home">
        <header class="panel-header">
          <div class="app-menu-wrap">
            <div class="app-brand app-menu-button locked" data-app-menu="true" role="button" tabindex="0" aria-expanded="false" aria-controls="app-menu">
              <img src="https://pr1-greenteacdn.lenovo.com.cn/config/202605/1780061482103_svgviewer-output%205.png" alt="" />
              <h1>联想 Token Hub</h1>
              <span class="menu-chevron" aria-hidden="true"></span>
            </div>
            <nav class="app-menu" id="app-menu" hidden aria-label="联想 Token Hub 菜单">
              <button data-web-link="dashboard"><span class="menu-item-main"><i>▥</i>数据看板</span><span>↗</span></button>
              <button data-web-link="logs"><span class="menu-item-main"><i>≋</i>使用日志</span><span>↗</span></button>
              <button data-web-link="keys"><span class="menu-item-main"><i>⚿</i>密钥管理</span><span>↗</span></button>
              <button data-web-link="marketplace"><span class="menu-item-main"><i>◇</i>模型广场</span><span>↗</span></button>
            </nav>
          </div>
          <div class="panel-actions">
            <button class="icon-button settings-button" data-settings="true" aria-label="设置" title="设置">⚙</button>
            <button class="icon-button" data-close-panel="true" aria-label="关闭">×</button>
          </div>
        </header>

        <section class="onboarding-card" id="onboarding-card"></section>

        <div class="ready-content" id="ready-content">
          <section class="smart-mode">
            <div class="smart-mode-main">
              <div class="smart-mode-copy">
                <span class="feature-icon compact">✦</span>
                <div>
                  <strong>智能模型匹配</strong>
                  <p>接管应用配置，并自动选择推荐模型</p>
                </div>
              </div>
              <button class="toggle" data-smart-toggle="true" aria-label="智能模型匹配"></button>
            </div>
            <div class="smart-inline-confirm" id="smart-confirm" hidden>
              <p>开启后，所有应用将改用 Token Hub 推荐模型。</p>
              <div>
                <button data-cancel-smart-confirm="true">取消</button>
                <button class="primary" data-confirm-smart-match="true">开启</button>
              </div>
            </div>
          </section>

          <section class="section-block">
            <div class="section-heading">
              <h2>应用列表</h2>
              <button class="icon-button refresh" data-refresh-apps="true" aria-label="重新检测应用" title="重新检测应用">↻</button>
            </div>
            <div class="tool-list" id="tool-list"></div>
          </section>

          <section class="account-list" id="account-bar"></section>
        </div>
      </div>

      <div class="panel-page" data-panel-page="models">
        <header class="detail-header">
          <button class="back-button" data-back-home="true" aria-label="返回">←</button>
          <div>
            <h1 id="detail-tool-name"></h1>
            <p>选择此应用使用的模型</p>
          </div>
          <button class="icon-button" data-close-panel="true" aria-label="关闭">×</button>
        </header>
        <div class="detail-accent"></div>
        <section class="model-list" id="model-list"></section>
      </div>

      <div class="panel-page" data-panel-page="settings">
        <header class="detail-header">
          <button class="back-button" data-back-home="true" aria-label="返回">←</button>
          <div>
            <h1>设置</h1>
          </div>
          <button class="icon-button" data-close-panel="true" aria-label="关闭">×</button>
        </header>
        <div class="detail-accent"></div>
        <section class="settings-list">
          <div class="setting-row"><div><strong>开机自启</strong><small>登录 Windows 后自动运行</small></div><button class="toggle active" aria-label="开机自启"></button></div>
          <div class="setting-row"><div><strong>系统通知</strong><small>发现新应用和切换异常时提醒</small></div><button class="toggle active" aria-label="系统通知"></button></div>
          <div class="setting-row"><div><strong>自动检测新应用</strong><small>安装应用后自动加入列表</small></div><button class="toggle active" aria-label="自动检测新应用"></button></div>
          <div class="setting-row"><div><strong>接管前二次确认</strong><small>开启智能匹配前确认是否由 Token Hub 管理应用配置</small></div><button class="toggle active" aria-label="接管前二次确认"></button></div>
        </section>
      </div>

      <div class="app-toast" id="app-toast" aria-live="polite"></div>
    </section>

    <aside class="desktop-notification" id="tool-notification" aria-live="polite"></aside>

    <section class="auth-window" id="auth-window" hidden aria-label="联想账号登录">
      <header class="auth-titlebar">
        <div>
          <img src="https://pr1-greenteacdn.lenovo.com.cn/config/202605/1780061482103_svgviewer-output%205.png" alt="" />
          <strong>联想账号登录</strong>
        </div>
        <button class="window-close" data-close-auth="true" aria-label="关闭">×</button>
      </header>
      <main class="auth-webview">
        <div class="auth-brand">
          <img src="https://pr1-greenteacdn.lenovo.com.cn/config/202605/1780061482103_svgviewer-output%205.png" alt="" />
          <strong>联想账号</strong>
        </div>
        <section class="auth-card">
          <h2>登录联想账号</h2>
          <p>登录后继续使用联想 Token Hub</p>
          <label>手机号</label>
          <input value="15*******88" aria-label="手机号" />
          <label>验证码</label>
          <div class="auth-code">
            <input value="2688" aria-label="验证码" />
            <button>获取验证码</button>
          </div>
          <button class="auth-submit" data-complete-login="true">登录并授权</button>
          <small>登录即表示您同意联想账号服务协议与隐私政策</small>
        </section>
      </main>
    </section>

    <section class="auth-window recharge-window" id="recharge-window" hidden aria-label="充值">
      <header class="auth-titlebar">
        <div>
          <img src="https://pr1-greenteacdn.lenovo.com.cn/config/202605/1780061482103_svgviewer-output%205.png" alt="" />
          <strong>充值</strong>
        </div>
        <button class="window-close" data-close-recharge="true" aria-label="关闭">×</button>
      </header>
      <main class="recharge-webview" id="recharge-content"></main>
    </section>

    <footer class="taskbar" aria-label="Windows 任务栏">
      <div class="taskbar-center">
        <button class="windows-start" aria-label="开始"><span></span><span></span><span></span><span></span></button>
        <button class="taskbar-app" aria-label="文件资源管理器">▰</button>
        <button class="taskbar-app" aria-label="Microsoft Teams">T</button>
        <button class="taskbar-app" aria-label="Windows 安全中心">♢</button>
      </div>
      <div class="system-tray">
        <span>⌃</span>
        <button class="tray-app-button active" id="tray-app-button" aria-label="联想 Token Hub 托盘菜单">
          <img src="https://pr1-greenteacdn.lenovo.com.cn/config/202605/1780061482103_svgviewer-output%205.png" alt="" />
        </button>
        <span>⌁</span>
        <span>▥</span>
        <time>10:01<br /><small>2026/6/2</small></time>
        <span>☾</span>
      </div>
    </footer>

    <div class="tray-context-menu" id="tray-context-menu" hidden role="menu" aria-label="联想 Token Hub 托盘菜单">
      <button data-exit-app="true" role="menuitem">退出应用</button>
    </div>

    <script src="./app.js?v=demo-menu-20260604"></script>
  </body>
</html>
